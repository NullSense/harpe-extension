<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harpe</title>
  <link rel="stylesheet" href="css/popup.css" />
</head>
<body>
  <header>
    <div class="header-left">
      <img src="icons/icon32.png" alt="" class="logo" />
      <span class="app-name">Harpe</span>
    </div>
    <div class="header-right">
      <button id="btn-settings" class="btn-icon" title="Settings" aria-label="Settings" aria-expanded="false">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3.2"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
      <button id="btn-rescan" class="btn-secondary">Rescan</button>
    </div>
  </header>

  <!-- Settings drawer (toggled by the gear) -->
  <section id="settings" class="settings" hidden>
    <label class="settings-label" for="dest">Save images to</label>
    <div class="settings-row">
      <input
        id="dest"
        class="settings-input"
        type="text"
        spellcheck="false"
        autocomplete="off"
        placeholder="~/Pictures/harpe  (default — organised by site)"
      />
      <button id="btn-save-settings" class="btn-primary">Save</button>
    </div>
    <p class="settings-help">
      An absolute folder on this computer (<code>~</code> and <code>$VARS</code> allowed).
      Leave blank for Harpe's defaults — images go to
      <code>~/Pictures/harpe</code>, grouped by the site they came from.
    </p>
    <p id="settings-status" class="settings-status" hidden></p>
  </section>

  <div class="page-title-bar">
    <span id="page-title" class="page-title"></span>
    <span id="count" class="count"></span>
  </div>

  <div id="status" class="status scanning">Initialising…</div>

  <div class="toolbar">
    <button id="btn-select-all" class="btn-secondary">Select all</button>
    <button id="btn-clear" class="btn-secondary">Clear</button>
    <button id="btn-grab" class="btn-primary" disabled>Grab</button>
  </div>

  <main id="grid" class="grid"></main>

  <script src="js/popup.js"></script>
</body>
</html>
